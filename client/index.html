<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>singedTerra</title>
  </head>
  <body>
    <div id="app">
      <!-- Play field: the canvas + a small on-canvas overlay (controls + game-over). -->
      <div id="stage">
        <canvas id="game" width="800" height="500"></canvas>
        <div id="game-overlay"></div>
      </div>
      <!-- HUD status widgets live in a side panel beside the canvas, not over it. -->
      <div id="hud" class="hud-panel"></div>
      <!-- Lobby is a full-app overlay shown before/between games. -->
      <div id="lobby" class="lobby-overlay"></div>
      <!-- In-game modal layer (store + game-over). Full-app, ABOVE the CRT chrome
           so panels render crisp and span the canvas+panel, not just the canvas. -->
      <div id="modal-layer"></div>
    </div>
    <!-- Title / splash screen: self-contained overlay shown on load (src/ui/Splash.ts) -->
    <script type="module" src="/src/ui/Splash.ts"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
