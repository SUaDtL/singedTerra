name: CodeQL

# Static security analysis. NOTE: uploading results to the Security tab requires a
# PUBLIC repo (or GitHub Advanced Security). The job below is guarded on repo
# visibility, so while the repo is private it is SKIPPED (neutral, not red) and it
# self-activates the moment the repo is made public — no edit needed at flip time.
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC

jobs:
  analyze:
    name: analyze (javascript-typescript)
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
