name: Deploy client to GitHub Pages

# Builds the Vite client and publishes it to GitHub Pages on every push to main
# (and on demand). The Supabase backend is deployed separately (npm run deploy:backend).
#
# One-time setup in the repo:
#   1. Settings → Pages → Build and deployment → Source: "GitHub Actions".
#   2. Settings → Secrets and variables → Actions → New repository secret:
#        VITE_SUPABASE_URL       = https://<project-ref>.supabase.co
#        VITE_SUPABASE_ANON_KEY  = <anon public key>
#      (These are inlined into the PUBLIC client bundle at build time and are safe to
#       expose — the anon key is RLS-gated by design, ADR-0006. Without them the site
#       still builds and hot-seat play works; only networked play needs them.)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege default for checkout and Pages metadata configuration.
permissions:
  contents: read
  pages: read

jobs:
  build:
    name: build client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Build (project-site base + Supabase env)
        run: npm run build
        env:
          # Vite base = "/<repo>/" so a GitHub Pages project site resolves assets correctly.
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: SPA fallback (404 = index)
        # This canvas app has no deep routes, but a 404.html copy makes any stray path
        # under the project base serve the app instead of a GitHub 404.
        run: cp client/dist/index.html client/dist/404.html
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Write deployment provenance
        run: node scripts/ci/pagesFreshness.mjs write client/dist/deploy-meta.json "$GITHUB_SHA" "$GITHUB_RUN_ID"
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: client/dist

  freshness:
    name: verify current main
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Verify source is current main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          current_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          node scripts/ci/pagesFreshness.mjs check "$GITHUB_SHA" "$current_sha"

  publish:
    name: deploy to Pages
    needs: [build, freshness]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    # Never run two Pages deploys at once; let an in-progress deploy finish (don't
    # cancel a live publish). Freshness is rechecked after this lock is acquired.
    concurrency:
      group: pages
      cancel-in-progress: false
      queue: max
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Verify source is still current main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          current_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          node scripts/ci/pagesFreshness.mjs check "$GITHUB_SHA" "$current_sha"
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
      - name: Verify deployed provenance
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6 7 8 9; do
            meta_url="${PAGE_URL%/}/deploy-meta.json?run=${GITHUB_RUN_ID}&attempt=${attempt}"
            if curl --fail --silent --show-error --connect-timeout 5 --max-time 15 --max-filesize 4096 --retry 2 --retry-delay 1 --retry-max-time 50 --retry-all-errors "$meta_url" \
              | node scripts/ci/pagesFreshness.mjs verify "$GITHUB_SHA" "$GITHUB_RUN_ID"; then
              exit 0
            fi
            if [ "$attempt" -eq 9 ]; then
              echo "Deployed provenance did not converge after 9 attempts." >&2
              exit 1
            fi
            sleep 2
          done

  live-smoke:
    # Closes the loop with issue #104 ("merged but stale/clipped in prod"): after the
    # bundle is LIVE, drive the real URL through the deterministic ?e2e=hotseat
    # entrypoint and fail loudly if the served bundle renders the HUD instrument
    # cluster crushed/clipped — i.e. if a broken or stale bundle reached users.
    name: post-deploy live smoke
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.pw.outputs.version }}
      - name: Install Playwright browser (+ deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      # E2E_LIVE_URL switches the config to no-webServer live mode; --grep @live +
      # --project=pixel-touch run only the single live smoke on the compact viewport.
      - name: Live render smoke
        run: npm run test:e2e -- --grep @live --project=pixel-touch
        env:
          E2E_LIVE_URL: ${{ needs.publish.outputs.page_url }}
