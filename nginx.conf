# singedTerra nginx — serves the static client bundle only.
#
# Networked play does NOT go through this box: the browser talks to Supabase
# (Edge Functions + Postgres + Realtime) directly. The old socket.io reverse
# proxy to a local Node server on :3000 was removed along with that stack
# (REVIEW_BACKLOG P2-12) — there is no app server to proxy to here anymore.
server {
  listen 80;
  server_name game.example.internal;   # or IP

  root /srv/singedTerra/client/dist;
  index index.html;

  # Baseline security headers. The app has no auth tokens/PII, but these are cheap
  # defense-in-depth: no MIME sniffing, no framing (clickjacking), and a tight
  # referrer/permissions posture. connect-src allows the Supabase backend the
  # client talks to directly (Edge Functions + Realtime websocket).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'" always;

  # SPA fallback: serve the built client; the app handles routing.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
