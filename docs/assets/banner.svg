<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" role="img" aria-label="singedTerra — a love letter to Scorched Earth (1991). Two pixel-art tanks duel across scorched, destructible terrain at dusk while a wind-bent shell arcs toward a 16-bit airburst.">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#160d2e"/>
      <stop offset="38%" stop-color="#3a1d5e"/>
      <stop offset="64%" stop-color="#8e2f53"/>
      <stop offset="84%" stop-color="#d4562a"/>
      <stop offset="100%" stop-color="#f2a04b"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5a3a22"/>
      <stop offset="45%" stop-color="#3c2516"/>
      <stop offset="100%" stop-color="#1d120b"/>
    </linearGradient>
    <linearGradient id="farhill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b2a4d"/>
      <stop offset="100%" stop-color="#3a1a36"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="55%" stop-color="#ffb24a"/>
      <stop offset="100%" stop-color="#ff7a1f"/>
    </radialGradient>
    <radialGradient id="boom" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff7d6"/>
      <stop offset="35%" stop-color="#ffd23f"/>
      <stop offset="70%" stop-color="#ff7a1f"/>
      <stop offset="100%" stop-color="#ff7a1f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- sky -->
  <rect x="0" y="0" width="800" height="300" fill="url(#sky)"/>

  <!-- stars (pixel blocks) -->
  <g fill="#fdf3c7" shape-rendering="crispEdges">
    <rect x="60"  y="28" width="3" height="3"/>
    <rect x="140" y="52" width="2" height="2"/>
    <rect x="232" y="22" width="3" height="3"/>
    <rect x="300" y="60" width="2" height="2"/>
    <rect x="520" y="30" width="3" height="3"/>
    <rect x="612" y="20" width="2" height="2"/>
    <rect x="700" y="48" width="3" height="3"/>
    <rect x="760" y="34" width="2" height="2"/>
    <rect x="420" y="26" width="2" height="2"/>
  </g>

  <!-- low sun -->
  <circle cx="400" cy="208" r="58" fill="url(#sun)" opacity="0.92"/>
  <g fill="#3a1d5e" shape-rendering="crispEdges" opacity="0.5">
    <rect x="345" y="196" width="110" height="4"/>
    <rect x="345" y="210" width="110" height="4"/>
    <rect x="345" y="224" width="110" height="4"/>
  </g>

  <!-- far hills -->
  <polygon points="0,210 90,176 190,206 300,170 410,200 520,168 640,202 740,178 800,200 800,300 0,300" fill="url(#farhill)" opacity="0.85"/>

  <!-- main scorched terrain (note the blasted crater notch under the airburst) -->
  <polygon points="0,250 70,232 130,224 175,236 240,250 300,242 360,256 430,250 470,238 506,250 540,262 560,238 590,234 660,248 720,232 800,244 800,300 0,300" fill="url(#ground)"/>
  <!-- terrain rim highlight -->
  <polyline points="0,250 70,232 130,224 175,236 240,250 300,242 360,256 430,250 470,238 506,250 540,262 560,238 590,234 660,248 720,232 800,244" fill="none" stroke="#7a4f2e" stroke-width="2" opacity="0.8"/>

  <!-- ===================== LEFT TANK (red) ===================== -->
  <g shape-rendering="crispEdges">
    <!-- tread -->
    <polygon points="108,228 152,228 146,236 114,236" fill="#2a2118"/>
    <rect x="112" y="221" width="36" height="8" fill="#b23a3a"/>
    <!-- body -->
    <rect x="118" y="214" width="24" height="9" fill="#e84d4d"/>
    <rect x="118" y="214" width="24" height="3" fill="#ff7a7a"/>
    <!-- barrel aimed up-right -->
    <rect x="138" y="200" width="22" height="4" fill="#f2a0a0" transform="rotate(-32 138 213)"/>
  </g>

  <!-- ===================== RIGHT TANK (blue) ===================== -->
  <g shape-rendering="crispEdges">
    <polygon points="636,226 680,226 674,234 642,234" fill="#1d2230"/>
    <rect x="640" y="219" width="36" height="8" fill="#3a64b0"/>
    <rect x="646" y="212" width="24" height="9" fill="#4d8ce8"/>
    <rect x="646" y="212" width="24" height="3" fill="#7fb0ff"/>
    <!-- barrel aimed up-left toward incoming fire -->
    <rect x="628" y="198" width="22" height="4" fill="#a8c8ff" transform="rotate(-148 650 211)"/>
  </g>

  <!-- ===================== SHELL ARC (wind-bent ballistic trajectory) ===================== -->
  <path d="M150 198 Q 360 60 540 196" fill="none" stroke="#ffd23f" stroke-width="2.5" stroke-dasharray="3 7" stroke-linecap="round" opacity="0.9"/>
  <!-- the shell -->
  <g shape-rendering="crispEdges">
    <rect x="445" y="96" width="6" height="6" fill="#fff7d6"/>
    <rect x="441" y="98" width="4" height="3" fill="#ffb24a" opacity="0.8"/>
  </g>

  <!-- ===================== AIRBURST over the right ridge ===================== -->
  <circle cx="548" cy="210" r="42" fill="url(#boom)"/>
  <g shape-rendering="crispEdges" fill="#fff7d6">
    <rect x="544" y="160" width="6" height="14"/>
    <rect x="588" y="186" width="14" height="6"/>
    <rect x="496" y="206" width="14" height="6"/>
    <rect x="544" y="244" width="6" height="14"/>
    <rect x="578" y="176" width="6" height="6"/>
    <rect x="512" y="176" width="6" height="6"/>
    <rect x="582" y="240" width="6" height="6"/>
    <rect x="510" y="238" width="6" height="6"/>
  </g>

  <!-- wind gauge (top-right HUD nod) -->
  <g shape-rendering="crispEdges">
    <text x="706" y="58" font-family="'Courier New',monospace" font-size="13" font-weight="bold" fill="#cfe3ff" opacity="0.85">WIND</text>
    <rect x="700" y="64" width="40" height="4" fill="#cfe3ff" opacity="0.55"/>
    <polygon points="744,66 736,60 736,72" fill="#7fb0ff"/>
  </g>

  <!-- ===================== TITLE ===================== -->
  <g font-family="'Trebuchet MS','Segoe UI',Verdana,sans-serif" font-weight="bold" text-anchor="middle">
    <!-- pixel drop shadow -->
    <text x="403" y="143" font-size="58" fill="#1a0a22" letter-spacing="1">singedTerra</text>
    <text x="400" y="140" font-size="58" letter-spacing="1">
      <tspan fill="#ffd23f">singed</tspan><tspan fill="#ff7a1f">Terra</tspan>
    </text>
  </g>
  <text x="400" y="170" text-anchor="middle" font-family="'Courier New',monospace" font-size="14" font-weight="bold" letter-spacing="3" fill="#ffe9a8">A LOVE LETTER TO SCORCHED EARTH &#183; 1991</text>

  <!-- scanline overlay for CRT feel -->
  <g fill="#000000" opacity="0.06" shape-rendering="crispEdges">
    <rect x="0" y="0"   width="800" height="2"/>
    <rect x="0" y="6"   width="800" height="2"/>
    <rect x="0" y="12"  width="800" height="2"/>
    <rect x="0" y="18"  width="800" height="2"/>
    <rect x="0" y="24"  width="800" height="2"/>
    <rect x="0" y="30"  width="800" height="2"/>
    <rect x="0" y="36"  width="800" height="2"/>
    <rect x="0" y="42"  width="800" height="2"/>
    <rect x="0" y="48"  width="800" height="2"/>
    <rect x="0" y="54"  width="800" height="2"/>
    <rect x="0" y="60"  width="800" height="2"/>
    <rect x="0" y="66"  width="800" height="2"/>
    <rect x="0" y="72"  width="800" height="2"/>
    <rect x="0" y="78"  width="800" height="2"/>
    <rect x="0" y="84"  width="800" height="2"/>
    <rect x="0" y="90"  width="800" height="2"/>
    <rect x="0" y="96"  width="800" height="2"/>
    <rect x="0" y="102" width="800" height="2"/>
    <rect x="0" y="108" width="800" height="2"/>
    <rect x="0" y="114" width="800" height="2"/>
    <rect x="0" y="120" width="800" height="2"/>
    <rect x="0" y="126" width="800" height="2"/>
    <rect x="0" y="132" width="800" height="2"/>
    <rect x="0" y="138" width="800" height="2"/>
    <rect x="0" y="144" width="800" height="2"/>
    <rect x="0" y="150" width="800" height="2"/>
    <rect x="0" y="156" width="800" height="2"/>
    <rect x="0" y="162" width="800" height="2"/>
    <rect x="0" y="168" width="800" height="2"/>
    <rect x="0" y="174" width="800" height="2"/>
    <rect x="0" y="180" width="800" height="2"/>
    <rect x="0" y="186" width="800" height="2"/>
    <rect x="0" y="192" width="800" height="2"/>
    <rect x="0" y="198" width="800" height="2"/>
    <rect x="0" y="204" width="800" height="2"/>
    <rect x="0" y="210" width="800" height="2"/>
    <rect x="0" y="216" width="800" height="2"/>
    <rect x="0" y="222" width="800" height="2"/>
    <rect x="0" y="228" width="800" height="2"/>
    <rect x="0" y="234" width="800" height="2"/>
    <rect x="0" y="240" width="800" height="2"/>
    <rect x="0" y="246" width="800" height="2"/>
    <rect x="0" y="252" width="800" height="2"/>
    <rect x="0" y="258" width="800" height="2"/>
    <rect x="0" y="264" width="800" height="2"/>
    <rect x="0" y="270" width="800" height="2"/>
    <rect x="0" y="276" width="800" height="2"/>
    <rect x="0" y="282" width="800" height="2"/>
    <rect x="0" y="288" width="800" height="2"/>
    <rect x="0" y="294" width="800" height="2"/>
  </g>

  <!-- frame -->
  <rect x="1.5" y="1.5" width="797" height="297" fill="none" stroke="#ffd23f" stroke-width="3" opacity="0.5"/>
</svg>
